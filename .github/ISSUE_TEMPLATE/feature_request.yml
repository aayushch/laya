name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you'd like
        to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? What's the use case?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Laya would this affect?
      options:
        - UI (Svelte frontend)
        - Engine (Python backend)
        - Tauri Shell
        - n8n Workflows
        - Pipeline (ingestion/classification)
        - Egress (outbound actions)
        - New integration / platform
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — affects my workflow
        - Critical — blocking my use of Laya

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, screenshots, links, or anything else.
