  <rect x="5" y="11.5" width="6" height="4.75" rx="1" fill="#E8903A"/>
  <rect x="13.25" y="11.5" width="6" height="4.75" rx="1" fill="#E8903A"/>
  <rect x="21" y="11.5" width="6" height="4.75" rx="1" fill="#E8903A"/>
  <rect x="5" y="18" width="6" height="4.75" rx="1" fill="#E8903A"/>
